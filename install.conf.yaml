- shell:
  - [git submodule update --init --recursive, Installing submodules]
  -
    command: sudo apt install zsh
    describe: Install zsh
    stdout: true
    stderr: true
    quiet: false

- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
      force: true
      path: zshrc

- shell:
  - 
    command: chsh -s $(which zsh)
    description: Making zsh the default shell
    stdout: true
    stderr: true
  -
    command: ./git/set-gitconfig.sh
    description: Configuring Git
    stdout: true
    stderr: true
    quiet: false
  -
    command: ./tower-crane/community_setup_linux.sh
    description: Setup subway
    stdout: true
    stderr: true
    quiet: false
