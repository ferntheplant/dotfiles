- shell:
  - [git submodule update --init --recursive, Installing submodules]

- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
      force: true
      path: zshrc

- shell:
  - [chsh -s $(which zsh), Making zsh the default shell]
  -
    command: ./git/set-gitconfig.sh
    description: Configuring Git
    stdout: true
    stderr: true
    quiet: false
